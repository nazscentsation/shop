<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Nazscentsation</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="glow glow--top"></div>
  <main class="container" style="justify-content:center;min-height:100vh">
    <header class="logo-wrap">
      <a href="/"><img src="assets/images/logo.svg" alt="Nazscentsation" class="logo-img"/></a>
    </header>

    <div style="width:100%;max-width:400px;padding:1rem 0">
      <p class="eyebrow" style="margin-bottom:1.6rem">Reset Your Password</p>

      <div id="resetForm">
        <div class="ns-field">
          <label for="newPass">New Password <span class="ns-hint">(min. 8 characters)</span></label>
          <input type="password" id="newPass" autocomplete="new-password"/>
        </div>
        <div class="ns-field">
          <label for="confirmPass">Confirm Password</label>
          <input type="password" id="confirmPass" autocomplete="new-password"/>
        </div>
        <p class="ns-modal-feedback" id="resetFeedback"></p>
        <button class="ns-btn-gold" id="resetBtn" style="margin-top:0.5rem">Set New Password</button>
      </div>

      <div id="resetDone" hidden style="text-align:center">
        <p class="subtext" id="resetMsg"></p>
        <a href="/" style="display:inline-block;margin-top:1.6rem;color:#C9A84C;font-size:0.78rem;letter-spacing:0.12em;text-decoration:none">Return to Home</a>
      </div>
    </div>
  </main>

  <script src="assets/js/app.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('resetForm').hidden = true;
      const done = document.getElementById('resetDone');
      document.getElementById('resetMsg').textContent = 'Invalid or missing reset token.';
      done.hidden = false;
    }

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const pass    = document.getElementById('newPass').value;
      const confirm = document.getElementById('confirmPass').value;
      const fb      = document.getElementById('resetFeedback');
      const btn     = document.getElementById('resetBtn');

      fb.className = 'ns-modal-feedback error';
      if (pass.length < 8) { fb.textContent = 'Password must be at least 8 characters.'; return; }
      if (pass !== confirm) { fb.textContent = 'Passwords do not match.'; return; }

      NS.btnLoading(btn, true);
      const { ok, data } = await NS.api('POST', '/api/auth/reset-password', { token, password: pass });
      NS.btnLoading(btn, false);

      if (ok) {
        document.getElementById('resetForm').hidden = true;
        document.getElementById('resetMsg').textContent = data.message || 'Password reset successfully. You can now sign in.';
        document.getElementById('resetDone').hidden = false;
      } else {
        fb.textContent = data.error || 'Could not reset password. The link may have expired.';
      }
    });
  </script>
</body>
</html>
