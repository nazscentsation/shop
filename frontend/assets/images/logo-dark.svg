<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 130" width="680" height="130">
  <defs>
    <linearGradient id="dgold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#b8860b"/>
      <stop offset="40%"  stop-color="#9a6e00"/>
      <stop offset="100%" stop-color="#7a5500"/>
    </linearGradient>
    <linearGradient id="dfade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#9a7020" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#9a7020" stop-opacity="0.7"/>
      <stop offset="70%"  stop-color="#9a7020" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#9a7020" stop-opacity="0"/>
    </linearGradient>
    <filter id="dsoft">
      <feGaussianBlur stdDeviation="0.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Mist dots -->
  <g opacity="0.35">
    <circle cx="60"  cy="18" r="2.2" fill="#9a7020"/>
    <circle cx="74"  cy="10" r="1.4" fill="#b8860b"/>
    <circle cx="89"  cy="7"  r="1.0" fill="#7a5500"/>
    <circle cx="48"  cy="28" r="1.5" fill="#9a7020"/>
    <circle cx="38"  cy="16" r="0.8" fill="#b8860b"/>
    <circle cx="80"  cy="22" r="0.7" fill="#7a5500"/>
    <circle cx="68"  cy="31" r="1.3" fill="#9a7020"/>
  </g>

  <!-- Arabesque left -->
  <g opacity="0.3" fill="none" stroke="#9a7020" stroke-width="0.8">
    <path d="M 32 65 Q 16 50 26 36 Q 38 22 54 34 Q 66 46 52 58"/>
    <path d="M 32 65 Q 18 80 30 92 Q 44 104 56 93"/>
    <circle cx="32" cy="65" r="1.8" fill="#9a7020" stroke="none"/>
  </g>

  <!-- Arabesque right -->
  <g opacity="0.3" fill="none" stroke="#9a7020" stroke-width="0.8">
    <path d="M 648 65 Q 664 50 654 36 Q 642 22 626 34 Q 614 46 628 58"/>
    <path d="M 648 65 Q 662 80 650 92 Q 636 104 624 93"/>
    <circle cx="648" cy="65" r="1.8" fill="#9a7020" stroke="none"/>
  </g>

  <!-- Top rules -->
  <line x1="78"  y1="36" x2="300" y2="36" stroke="url(#dfade)" stroke-width="0.55"/>
  <line x1="380" y1="36" x2="602" y2="36" stroke="url(#dfade)" stroke-width="0.55"/>

  <!-- Crown ornament -->
  <g filter="url(#dsoft)" opacity="0.8">
    <path d="M 340 24 L 340 36" stroke="#9a7020" stroke-width="0.7"/>
    <path d="M 328 32 L 340 36 L 352 32" fill="none" stroke="#9a7020" stroke-width="0.7"/>
    <circle cx="340" cy="36" r="2.8" fill="#9a7020"/>
    <circle cx="318" cy="28" r="1.4" fill="#9a7020"/>
    <circle cx="362" cy="28" r="1.4" fill="#9a7020"/>
    <circle cx="340" cy="22" r="1.1" fill="#9a7020"/>
  </g>

  <!-- NAZSCENTSATION — dark version -->
  <text
    x="340" y="78"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-size="36"
    font-style="italic"
    font-weight="400"
    letter-spacing="7"
    fill="#1a1208"
    filter="url(#dsoft)"
  >NAZSCENTSATION</text>

  <!-- Bottom separator -->
  <line x1="78"  y1="96" x2="290" y2="96" stroke="url(#dfade)" stroke-width="0.6"/>
  <path d="M 315 92 Q 340 86 365 92 Q 340 100 315 92 Z" fill="#9a7020" opacity="0.45"/>
  <circle cx="340" cy="96" r="1.5" fill="#9a7020"/>
  <line x1="390" y1="96" x2="602" y2="96" stroke="url(#dfade)" stroke-width="0.6"/>

  <!-- Tagline -->
  <text
    x="340" y="110"
    text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-size="7"
    letter-spacing="5.5"
    fill="#9a7020"
    opacity="0.6"
  >LUXURY  ·  FRAGRANCE  ·  ARTISTRY</text>

  <line x1="130" y1="120" x2="550" y2="120" stroke="url(#dfade)" stroke-width="0.35"/>
</svg>
